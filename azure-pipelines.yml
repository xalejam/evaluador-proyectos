trigger:
  branches:
    include:
      - main
      - master
      - develop

pr:
  branches:
    include:
      - "*"

pool:
  vmImage: "ubuntu-latest"

variables:
  PYTHON_VERSION: "3.12"

steps:
  - checkout: self
    clean: true
    fetchDepth: 0

  - task: UsePythonVersion@0
    inputs:
      versionSpec: "$(PYTHON_VERSION)"
    displayName: "Use Python $(PYTHON_VERSION)"

  - script: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
      pip install -r requirements-dev.txt
    displayName: "Install dependencies"

  - script: |
      ruff check .
      black --check .
    displayName: "Lint and format checks"

  - script: |
      python - <<'PY'
      from pathlib import Path
      import py_compile

      roots = [
          Path("start.py"),
          Path("main.py"),
          Path("ui"),
          Path("domain"),
          Path("infra"),
          Path("tests"),
      ]
      for root in roots:
          if root.is_file():
              py_compile.compile(str(root), doraise=True)
              continue
          for file in root.rglob("*.py"):
              py_compile.compile(str(file), doraise=True)
      print("py_compile OK")
      PY
    displayName: "Compile check"

  - script: |
      pytest -q
    displayName: "Run tests"

  - script: |
      git remote remove github || true
      git remote add github https://x-token-auth:$(GITHUB_TOKEN)@github.com/xalejam/evaluador-proyectos.git
      git push github refs/heads/main:refs/heads/main --force
    displayName: "Mirror to GitHub"
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
